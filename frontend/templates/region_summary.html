<!-- KPI Container -->
{% include "partials/kpi_cards.html" %}

<!-- Filters -->
<div class="card card-default">
    <div class="card-body">
        <div class="row align-items-end">
            <div class="col-md-3">
                <div class="form-group mb-0">
                    <label>Program Type</label>
                    <select id="programTypeFilter" class="form-control select2">
                        <option value="">Select Program</option>
                    </select>
                </div>
            </div>
            <div class="col-md-2">
                <div class="form-group mb-0">
                    <label>Select Year</label>
                    <select id="yearFilter" class="form-control select2">
                        <option value="">Select Year</option>
                    </select>
                </div>
            </div>
            <div class="col-md-2">
                <div class="form-group mb-0">
                    <label>Month</label>
                    <select id="monthFilter" class="form-control select2">
                        <option value="">Select Month</option>
                    </select>
                </div>
            </div>
            <div class="col-md-2">
                <button id="seeReportBtn" class="btn btn-primary btn-sm btn-block">See Report</button>
            </div>
            <div class="col-md-1">
                <button id="exportXlsx" class="btn btn-export btn-sm btn-block">
                    <i class="fas fa-file-excel"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<div id="reportContent">
    <div class="row">
        <div class="col-lg-8">
            <div class="card card-outline card-info">
                <div class="card-header border-0">
                    <h3 class="card-title">Region Performance Metrics</h3>
                </div>
                <div class="card-body table-responsive p-0">
                    <table class="table table-striped table-valign-middle high-contrast-table" id="regionTable">
                        <thead>
                            <tr>
                                <th>Region</th>
                                <th>Sessions</th>
                                <th>Students</th>
                                <th>Teachers</th>
                                <th>Schools</th>
                                <th>Community</th>
                            </tr>
                        </thead>
                        <tbody id="summaryTableBody">
                            <!-- Rows will be injected here -->
                        </tbody>
                    </table>
                </div>
                {% include "partials/pagination.html" %}
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card card-outline card-info">
                <div class="card-header border-0">
                    <h3 class="card-title">Students Reached by Region</h3>
                </div>
                <div class="card-body">
                    <div class="chart">
                        <canvas id="regionChart" style="min-height: 250px; height: 250px; max-height: 250px; max-width: 100%;"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(function () {
    const pagination = window.PramanaPagination;

    if ($.fn.select2) {
        $('.select2').select2({ theme: 'bootstrap4' });
    }

    // Load initial filter options
    fetch('/region-summary/filters')
        .then(response => response.json())
        .then(data => {
            const pt = $('#programTypeFilter');
            const y = $('#yearFilter');
            const m = $('#monthFilter');
            
            data.programs.forEach(p => pt.append(new Option(p, p)));
            data.years.forEach(yr => y.append(new Option(yr, yr)));
            data.months.forEach(mo => m.append(new Option(mo.name, mo.id)));
        });

    function loadData() {
        const filters = {
            program_type: $('#programTypeFilter').val(),
            year: $('#yearFilter').val(),
            month: $('#monthFilter').val(),
            limit: pagination.state.limit,
            offset: pagination.state.offset
        };
        
        const query = new URLSearchParams(filters).toString();
        fetch(`/region-summary/data?${query}`)
            .then(response => response.json())
            .then(data => {
                const tbody = $('#summaryTableBody');
                tbody.empty();
                
                if (!data.table || data.table.length === 0) {
                    tbody.append('<tr><td colspan="6" class="text-center">No data found</td></tr>');
                    pagination.updateInfo('regionTable', 0);
                    return;
                }
                
                // Inject Table
                data.table.forEach(row => {
                    tbody.append(`
                        <tr>
                            <td>${row.region}</td>
                            <td>${row.sessions.toLocaleString()}</td>
                            <td>${row.students_reached.toLocaleString()}</td>
                            <td>${row.teachers_trained.toLocaleString()}</td>
                            <td>${row.schools_covered.toLocaleString()}</td>
                            <td>${row.community_reach.toLocaleString()}</td>
                        </tr>
                    `);
                });
                pagination.updateInfo('regionTable', data.total_count);
                
                // Update Chart
                const ctx = document.getElementById('regionChart').getContext('2d');
                if (window.myChart) {
                    window.myChart.destroy();
                }
                window.myChart = new Chart(ctx, {
                    type: 'bar',
                    data: data.chart,
                    options: {
                        maintainAspectRatio: false,
                        responsive: true,
                        legend: { display: false },
                        scales: {
                            xAxes: [{ gridLines: { display: false } }],
                            yAxes: [{ gridLines: { display: false } }]
                        }
                    }
                });
            });
    }

    $('#seeReportBtn').on('click', function() {
        pagination.reset();
        loadData();
    });

    $('.prev-page').click(function() {
        pagination.prev(loadData);
    });

    $('.next-page').click(function() {
        pagination.next(loadData);
    });

    $('#exportXlsx').click(function() {
        const filters = {
            program_type: $('#programTypeFilter').val(),
            year: $('#yearFilter').val(),
            month: $('#monthFilter').val()
        };
        const query = new URLSearchParams(filters).toString();
        window.exportToXLSX(`/region-summary/export?${query}`, 'region_summary.xlsx');
    });

    // Auto-load
    setTimeout(loadData, 300);
});
</script>
{% endblock %}
