{% extends "base.html" %}

{% block content %}
<div class="row">
    <!-- Left Column: Filter Slicers -->
    <div class="col-md-2 mb-3">
        <div class="card card-outline card-primary h-100">
            <div class="card-header">
                <h3 class="card-title"><i class="fas fa-filter mr-1"></i> Filters</h3>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label>Program Type</label>
                    <select id="programTypeFilter" class="form-control select2">
                        <option value="">Select Program</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Select Year</label>
                    <select id="yearFilter" class="form-control select2">
                        <option value="">Select Year</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Month</label>
                    <select id="monthFilter" class="form-control select2">
                        <option value="">Select Month</option>
                    </select>
                </div>
                <hr>
                <button id="seeReportBtn" class="btn btn-primary btn-block mb-2">
                    <i class="fas fa-sync-alt mr-1"></i> See Report
                </button>
                <button id="exportXlsx" class="btn btn-export btn-block">
                    <i class="fas fa-file-excel mr-1"></i> Export to XLSX
                </button>
            </div>
        </div>
    </div>

    <!-- Right Column: Dashboard Content -->
    <div class="col-md-10">
        <!-- Dynamic KPI Cards -->
        <div class="row mb-4">
            <div class="col-lg-4 col-6">
                <div class="small-box bg-info">
                    <div class="inner">
                        <h3 id="kpiSchoolVisits">0</h3>
                        <p>Total School visits</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-school"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-4 col-6">
                <div class="small-box bg-success">
                    <div class="inner">
                        <h3 id="kpiScienceFairs">0</h3>
                        <p>Total Science Fair (SF)</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-flask"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-4 col-6">
                <div class="small-box bg-danger">
                    <div class="inner">
                        <h3 id="kpiTeacherTraining">0</h3>
                        <p>Total Teacher Training Program (TTP)</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-chalkboard-teacher"></i>
                    </div>
                </div>
            </div>
        </div>

        <div id="reportContent">
            <div class="row">
                <div class="col-lg-12">
                    <div class="card card-outline card-info">
                        <div class="card-body table-responsive p-0">
                            <table class="table table-striped table-valign-middle high-contrast-table" id="regionTable">
                                <thead>
                                    <tr>
                                        <th>Region</th>
                                        <th>Sessions</th>
                                        <th>Students</th>
                                        <th>Teachers</th>
                                        <th>Schools</th>
                                    </tr>
                                </thead>
                                <tbody id="summaryTableBody">
                                    <!-- Rows will be injected here -->
                                </tbody>
                            </table>
                        </div>
                        {% include "partials/pagination.html" %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    $(function () {
        const pagination = window.PramanaPagination;

        if ($.fn.select2) {
            $('.select2').select2({ theme: 'bootstrap4' });
        }

        // Load initial filter options
        fetch('/region-summary/filters')
            .then(response => response.json())
            .then(data => {
                const pt = $('#programTypeFilter');
                const y = $('#yearFilter');
                const m = $('#monthFilter');

                data.programs.forEach(p => pt.append(new Option(p, p)));
                data.years.forEach(yr => y.append(new Option(yr, yr)));
                data.months.forEach(mo => m.append(new Option(mo.name, mo.id)));
            });

        function loadData() {
            const filters = {
                program_type: $('#programTypeFilter').val(),
                year: $('#yearFilter').val(),
                month: $('#monthFilter').val(),
                limit: pagination.state.limit,
                offset: pagination.state.offset
            };

            const query = new URLSearchParams(filters).toString();
            fetch(`/region-summary/data?${query}`)
                .then(response => response.json())
                .then(data => {
                    const tbody = $('#summaryTableBody');
                    tbody.empty();

                    // Update KPIs (Now 3 instead of 4)
                    if (data.kpis) {
                        $('#kpiSchoolVisits').text(data.kpis[0].value.toLocaleString());
                        $('#kpiScienceFairs').text(data.kpis[1].value.toLocaleString());
                        $('#kpiTeacherTraining').text(data.kpis[2].value.toLocaleString());
                    }

                    if (!data.table || data.table.length === 0) {
                        tbody.append('<tr><td colspan="5" class="text-center">No data found</td></tr>');
                        pagination.updateInfo('regionTable', 0);
                        return;
                    }

                    // Inject Table
                    data.table.forEach(row => {
                        tbody.append(`
                        <tr>
                            <td>${row.region}</td>
                            <td>${row.sessions.toLocaleString()}</td>
                            <td>${row.students_reached.toLocaleString()}</td>
                            <td>${row.teachers_trained.toLocaleString()}</td>
                            <td>${row.schools_covered.toLocaleString()}</td>
                        </tr>
                    `);
                    });
                    pagination.updateInfo('regionTable', data.total_count);
                });
        }


        $('#seeReportBtn').on('click', function () {
            pagination.reset();
            loadData();
        });

        $('.prev-page').click(function () {
            pagination.prev(loadData);
        });

        $('.next-page').click(function () {
            pagination.next(loadData);
        });

        $('#exportXlsx').click(function () {
            const filters = {
                program_type: $('#programTypeFilter').val(),
                year: $('#yearFilter').val(),
                month: $('#monthFilter').val()
            };
            const query = new URLSearchParams(filters).toString();
            window.exportToXLSX(`/region-summary/export?${query}`, 'region_summary.xlsx');
        });

        // Auto-load
        setTimeout(loadData, 300);
    });
</script>
{% endblock %}
