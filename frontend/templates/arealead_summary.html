{% extends "base.html" %}

{% block content %}
<div class="row">
    <!-- Left Column: Filter Slicers -->
    <div class="col-md-2 mb-3">
        <div class="card card-outline card-primary h-100">
            <div class="card-header">
                <h3 class="card-title"><i class="fas fa-filter mr-1"></i> Filters</h3>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label>Region</label>
                    <select id="regionFilter" class="form-control select2">
                        <option value="">All Regions</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Area</label>
                    <select id="areaFilter" class="form-control select2">
                        <option value="">All Areas</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Select Year</label>
                    <select id="yearFilter" class="form-control select2">
                        <option value="">All Years</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Month</label>
                    <select id="monthFilter" class="form-control select2">
                        <option value="">All Months</option>
                    </select>
                </div>
                <hr>
                <button id="seeReport" class="btn btn-primary btn-block mb-2">
                    <i class="fas fa-sync-alt mr-1"></i> See Report
                </button>
                <button id="exportXlsx" class="btn btn-export btn-block">
                    <i class="fas fa-file-excel mr-1"></i> Export to XLSX
                </button>
            </div>
        </div>
    </div>

    <!-- Right Column: Dashboard Content -->
    <div class="col-md-10">
        <!-- KPI Cards -->
        <div id="kpiContainer" class="row mb-4">
            <div class="col-lg-3 col-6">
                <div class="small-box bg-info">
                    <div class="inner">
                        <h3 id="kpiTotalLeads">0</h3>
                        <p>Total Area Leads</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-user-tie"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-success">
                    <div class="inner">
                        <h3 id="kpiTotalInstructors">0</h3>
                        <p>Total Instructors</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-chalkboard-teacher"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-navy-blue">
                    <div class="inner">
                        <h3 id="kpiTotalSessions">0</h3>
                        <p>Total Sessions</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-layer-group"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-danger">
                    <div class="inner">
                        <h3 id="kpiTotalStudents">0</h3>
                        <p>Total Students Impacted</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-user-graduate"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="card mt-2">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table id="areaTable" class="table table-striped table-hover mb-0 high-contrast-table">
                        <thead>
                            <tr>
                                <th>Area</th>
                                <th>Region</th>
                                <th class="text-center">Total Instructors</th>
                                <th class="text-center">Total Sessions</th>
                                <th class="text-center">Total Students</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
                {% include "partials/pagination.html" %}
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(function () {
    const pagination = window.PramanaPagination;

    if ($.fn.select2) {
        $('.select2').select2({ theme: 'bootstrap4' });
    }

    fetch('/arealead-summary/filters')
        .then(res => res.json())
        .then(data => {
            const regionSelect = $('#regionFilter');
            const areaSelect = $('#areaFilter');
            const yearSelect = $('#yearFilter');
            const monthSelect = $('#monthFilter');

            data.regions.forEach(r => regionSelect.append(new Option(r, r)));
            data.areas.forEach(a => areaSelect.append(new Option(a, a)));
            data.years.forEach(y => yearSelect.append(new Option(y, y)));
            data.months.forEach(m => monthSelect.append(new Option(m.name, m.id)));
        });

    function loadData() {
        const filters = {
            region: $('#regionFilter').val(),
            area: $('#areaFilter').val(),
            year: $('#yearFilter').val(),
            month: $('#monthFilter').val(),
            limit: pagination.state.limit,
            offset: pagination.state.offset
        };

        const query = new URLSearchParams(filters).toString();
        fetch(`/arealead-summary/data?${query}`)
            .then(res => res.json())
            .then(data => {
                const tbody = $('#areaTable tbody');
                tbody.empty();

                // Update KPIs
                if (data.kpis && data.kpis.length >= 4) {
                    $('#kpiTotalLeads').text(data.kpis[0].value.toLocaleString());
                    $('#kpiTotalInstructors').text(data.kpis[1].value.toLocaleString());
                    $('#kpiTotalSessions').text(data.kpis[2].value.toLocaleString());
                    $('#kpiTotalStudents').text(data.kpis[3].value.toLocaleString());
                }

                if (!data.table || data.table.length === 0) {
                    tbody.append('<tr><td colspan="5" class="text-center py-4 text-muted">No records found for selected period</td></tr>');
                    pagination.updateInfo('areaTable', 0);
                    return;
                }

                data.table.forEach(row => {
                    tbody.append(`
                        <tr>
                            <td class="font-weight-bold text-navy">${row.area}</td>
                            <td><small class="text-muted"><i class="fas fa-globe mr-1"></i> ${row.region}</small></td>
                            <td class="text-center"><span class="badge badge-info px-2 py-1">${row.total_instructors}</span></td>
                            <td class="text-center font-weight-bold">${row.total_sessions.toLocaleString()}</td>
                            <td class="text-center text-success font-weight-bold">${row.total_students.toLocaleString()}</td>
                        </tr>
                    `);
                });
                pagination.updateInfo('areaTable', data.total_count);
            })
            .catch(err => console.error("Error fetching data:", err));
    }

    $('#seeReport').click(function () {
        pagination.reset();
        loadData();
    });

    $('.prev-page').click(function() {
        pagination.prev(loadData);
    });

    $('.next-page').click(function() {
        pagination.next(loadData);
    });

    $('#exportXlsx').click(function() {
        const filters = {
            region: $('#regionFilter').val(),
            area: $('#areaFilter').val(),
            year: $('#yearFilter').val(),
            month: $('#monthFilter').val()
        };
        const query = new URLSearchParams(filters).toString();
        window.exportToXLSX(`/arealead-summary/export?${query}`, 'arealead_summary.xlsx');
    });

    // Auto-load
    setTimeout(loadData, 300);
});
</script>
{% endblock %}
