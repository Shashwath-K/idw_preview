{% extends "base.html" %}

{% block content %}
<div class="content-header">
    <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-sm-6">
                <h1 class="m-0">Program Wise Report</h1>
            </div>
        </div>
    </div>
</div>

<section class="content">
    <div class="container-fluid">
        <!-- Filters -->
        <div class="card card-default">
            <div class="card-body">
                <div class="row align-items-end">
                    <div class="col-md-3">
                        <div class="form-group mb-0">
                            <label>Program Category</label>
                            <select id="categoryFilter" class="form-control select2">
                                <option value="">All Categories</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="form-group mb-0">
                            <label>Select Year</label>
                            <select id="yearFilter" class="form-control select2">
                                <option value="">All Years</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="form-group mb-0">
                            <label>Month</label>
                            <select id="monthFilter" class="form-control select2">
                                <option value="">All Months</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <button id="seeReport" class="btn btn-info btn-block">See Report</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="card mt-3">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table id="programTable" class="table table-striped table-hover mb-0">
                        <thead>
                            <tr>
                                <th>Program Name</th>
                                <th>Category</th>
                                <th>Sessions</th>
                                <th>Students</th>
                                <th>Schools Covered</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
$(function () {
    if ($.fn.select2) {
        $('.select2').select2({ theme: 'bootstrap4' });
    }

    fetch('/programwise-report/filters')
        .then(res => res.json())
        .then(data => {
            const categorySelect = $('#categoryFilter');
            const yearSelect = $('#yearFilter');
            const monthSelect = $('#monthFilter');

            data.categories.forEach(c => categorySelect.append(new Option(c, c)));
            data.years.forEach(y => yearSelect.append(new Option(y, y)));
            data.months.forEach(m => monthSelect.append(new Option(m.name, m.id)));
        });

    $('#seeReport').click(function () {
        const filters = {
            category: $('#categoryFilter').val(),
            year: $('#yearFilter').val(),
            month: $('#monthFilter').val()
        };

        const query = new URLSearchParams(filters).toString();
        fetch(`/programwise-report/data?${query}`)
            .then(res => res.json())
            .then(data => {
                const tbody = $('#programTable tbody');
                tbody.empty();
                if (data.table.length === 0) {
                    tbody.append('<tr><td colspan="5" class="text-center">No data found</td></tr>');
                    return;
                }
                data.table.forEach(row => {
                    tbody.append(`
                        <tr>
                            <td>${row.program_name}</td>
                            <td>${row.program_category}</td>
                            <td><span class="badge badge-info">${row.sessions}</span></td>
                            <td>${row.students}</td>
                            <td>${row.schools_covered}</td>
                        </tr>
                    `);
                });
            });
    });
});
</script>
{% endblock %}
