{% extends "base.html" %}

{% block content %}
<!-- KPI Cards -->
{% include "partials/kpi_cards.html" %}

<!-- Filters -->
<div class="card card-default">
    <div class="card-body">
        <div class="row align-items-end">
            <div class="col-md-3">
                <div class="form-group mb-0">
                    <label>Program Category</label>
                    <select id="categoryFilter" class="form-control select2">
                        <option value="">All Categories</option>
                    </select>
                </div>
            </div>
            <div class="col-md-2">
                <div class="form-group mb-0">
                    <label>Select Year</label>
                    <select id="yearFilter" class="form-control select2">
                        <option value="">All Years</option>
                    </select>
                </div>
            </div>
            <div class="col-md-2">
                <div class="form-group mb-0">
                    <label>Month</label>
                    <select id="monthFilter" class="form-control select2">
                        <option value="">All Months</option>
                    </select>
                </div>
            </div>
            <div class="col-md-2">
                <button id="seeReport" class="btn btn-info btn-sm btn-block">See Report</button>
            </div>
            <div class="col-md-1">
                <button id="exportXlsx" class="btn btn-export btn-sm btn-block">
                    <i class="fas fa-file-excel"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Table -->
<div class="card mt-2">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table id="programTable" class="table table-striped table-hover mb-0 high-contrast-table">
                <thead>
                    <tr>
                        <th>Program Name</th>
                        <th>Category</th>
                        <th>Sessions</th>
                        <th>Students</th>
                        <th>Schools Covered</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>
        {% include "partials/pagination.html" %}
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(function () {
    const pagination = window.PramanaPagination;

    if ($.fn.select2) {
        $('.select2').select2({ theme: 'bootstrap4' });
    }

    fetch('/programwise-report/filters')
        .then(res => res.json())
        .then(data => {
            const categorySelect = $('#categoryFilter');
            const yearSelect = $('#yearFilter');
            const monthSelect = $('#monthFilter');

            data.categories.forEach(c => categorySelect.append(new Option(c, c)));
            data.years.forEach(y => yearSelect.append(new Option(y, y)));
            data.months.forEach(m => monthSelect.append(new Option(m.name, m.id)));
        });

    function loadData() {
        const filters = {
            category: $('#categoryFilter').val(),
            year: $('#yearFilter').val(),
            month: $('#monthFilter').val(),
            limit: pagination.state.limit,
            offset: pagination.state.offset
        };

        const query = new URLSearchParams(filters).toString();
        fetch(`/programwise-report/data?${query}`)
            .then(res => res.json())
            .then(data => {
                const tbody = $('#programTable tbody');
                tbody.empty();
                if (data.table.length === 0) {
                    tbody.append('<tr><td colspan="5" class="text-center">No data found</td></tr>');
                    pagination.updateInfo('programTable', 0);
                    return;
                }
                data.table.forEach(row => {
                    tbody.append(`
                        <tr>
                            <td>${row.program_name}</td>
                            <td>${row.program_category}</td>
                            <td><span class="badge badge-info">${row.sessions}</span></td>
                            <td>${row.students}</td>
                            <td>${row.schools_covered}</td>
                        </tr>
                    `);
                });
                pagination.updateInfo('programTable', data.total_count);
            });
    }

    $('#seeReport').click(function () {
        pagination.reset();
        loadData();
    });

    $('.prev-page').click(function() {
        pagination.prev(loadData);
    });

    $('.next-page').click(function() {
        pagination.next(loadData);
    });

    $('#exportXlsx').click(function() {
        const filters = {
            category: $('#categoryFilter').val(),
            year: $('#yearFilter').val(),
            month: $('#monthFilter').val()
        };
        const query = new URLSearchParams(filters).toString();
        window.exportToXLSX(`/programwise-report/export?${query}`, 'programwise_report.xlsx');
    });

    // Auto-load
    setTimeout(loadData, 300);
});
</script>
{% endblock %}
