{% extends "layout.html" %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="card card-outline card-primary filter-panel">
            <div class="card-header">
                <h3 class="card-title">Global Filters</h3>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-3">
                        <label for="startYear">Start Year</label>
                        <input id="startYear" type="range" min="2020" max="2026" value="2020" class="custom-range">
                        <div class="filter-value" id="startYearLabel">2020</div>
                    </div>
                    <div class="col-md-3">
                        <label for="endYear">End Year</label>
                        <input id="endYear" type="range" min="2020" max="2026" value="2026" class="custom-range">
                        <div class="filter-value" id="endYearLabel">2026</div>
                    </div>
                    <div class="col-md-3">
                        <label for="regionFilter">Region</label>
                        <select id="regionFilter" class="form-control">
                            <option value="">All Regions</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label for="programFilter">Program</label>
                        <select id="programFilter" class="form-control">
                            <option value="">All Programs</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-lg-3 col-6">
        <div class="small-box bg-info">
            <div class="inner">
                <h3 id="dashboardTotalSessions">0</h3>
                <p>Total Sessions</p>
            </div>
            <div class="icon"><i class="fas fa-calendar-check"></i></div>
        </div>
    </div>
    <div class="col-lg-3 col-6">
        <div class="small-box bg-success">
            <div class="inner">
                <h3 id="dashboardTotalStudents">0</h3>
                <p>Total Students</p>
            </div>
            <div class="icon"><i class="fas fa-user-graduate"></i></div>
        </div>
    </div>
    <div class="col-lg-3 col-6">
        <div class="small-box bg-warning">
            <div class="inner">
                <h3 id="dashboardTotalInstructors">0</h3>
                <p>Total Instructors</p>
            </div>
            <div class="icon"><i class="fas fa-chalkboard-teacher"></i></div>
        </div>
    </div>
    <div class="col-lg-3 col-6">
        <div class="small-box bg-danger">
            <div class="inner">
                <h3 id="dashboardTotalPrograms">0</h3>
                <p>Total Programs</p>
            </div>
            <div class="icon"><i class="fas fa-layer-group"></i></div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header"><h3 class="card-title">Region Impact</h3></div>
            <div class="card-body"><canvas id="regionImpactChart" height="180"></canvas></div>
        </div>
    </div>
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header"><h3 class="card-title">Monthly Sessions</h3></div>
            <div class="card-body"><canvas id="monthlySessionsChart" height="180"></canvas></div>
        </div>
    </div>
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header"><h3 class="card-title">Instructor Productivity</h3></div>
            <div class="card-body"><canvas id="instructorProductivityChart" height="180"></canvas></div>
        </div>
    </div>
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header"><h3 class="card-title">Program Metrics</h3></div>
            <div class="card-body"><canvas id="programMetricsChart" height="180"></canvas></div>
        </div>
    </div>
</div>
{% endblock %}
