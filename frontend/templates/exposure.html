{% extends "layout.html" %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="card card-outline card-primary filter-panel">
            <div class="card-header"><h3 class="card-title">Program Filters</h3></div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-3">
                        <label for="startYear">Start Year</label>
                        <input id="startYear" type="range" min="2020" max="2026" value="2020" class="custom-range">
                        <div class="filter-value" id="startYearLabel">2020</div>
                    </div>
                    <div class="col-md-3">
                        <label for="endYear">End Year</label>
                        <input id="endYear" type="range" min="2020" max="2026" value="2026" class="custom-range">
                        <div class="filter-value" id="endYearLabel">2026</div>
                    </div>
                    <div class="col-md-3">
                        <label for="regionFilter">Region</label>
                        <select id="regionFilter" class="form-control">
                            <option value="">All Regions</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label for="programFilter">Program</label>
                        <select id="programFilter" class="form-control">
                            <option value="">All Programs</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-lg-3 col-6"><div class="small-box bg-info"><div class="inner"><h3 id="programTotalStudents">0</h3><p>Total Students</p></div><div class="icon"><i class="fas fa-user-graduate"></i></div></div></div>
    <div class="col-lg-3 col-6"><div class="small-box bg-success"><div class="inner"><h3 id="programTotalPrograms">0</h3><p>Total Programs</p></div><div class="icon"><i class="fas fa-layer-group"></i></div></div></div>
    <div class="col-lg-3 col-6"><div class="small-box bg-warning"><div class="inner"><h3 id="programRegions">0</h3><p>Regions Covered</p></div><div class="icon"><i class="fas fa-map"></i></div></div></div>
    <div class="col-lg-3 col-6"><div class="small-box bg-danger"><div class="inner"><h3 id="programAverageStudents">0</h3><p>Avg Students / Exposure</p></div><div class="icon"><i class="fas fa-chart-pie"></i></div></div></div>
</div>

<div class="row">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header"><h3 class="card-title">Program Reach</h3></div>
            <div class="card-body"><canvas id="programReachChart" height="180"></canvas></div>
        </div>
    </div>
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header"><h3 class="card-title">Program Distribution</h3></div>
            <div class="card-body"><canvas id="programDistributionChart" height="180"></canvas></div>
        </div>
    </div>
</div>
{% endblock %}
