<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pramana | {{ page_title }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}">
</head>
<body class="hold-transition sidebar-mini layout-fixed" data-page="{{ page_id }}">
<div class="wrapper">
    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
            </li>
        </ul>
        <span class="navbar-text font-weight-semibold text-uppercase small tracking-wide">Pramana Analytics Dashboard</span>
    </nav>

    <aside class="main-sidebar sidebar-dark-primary elevation-4">
        <a href="/" class="brand-link">
            <span class="brand-text font-weight-light">Pramana Dashboard</span>
        </a>
        <div class="sidebar">
            <nav class="mt-3">
                <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu">
                    <li class="nav-item">
                        <a href="/" class="nav-link {% if page_id == 'dashboard' %}active{% endif %}">
                            <i class="nav-icon fas fa-tachometer-alt"></i>
                            <p>Dashboard</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/sessions" class="nav-link {% if page_id == 'sessions' %}active{% endif %}">
                            <i class="nav-icon fas fa-calendar-alt"></i>
                            <p>Sessions</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/region-impact" class="nav-link {% if page_id == 'region' %}active{% endif %}">
                            <i class="nav-icon fas fa-map-marked-alt"></i>
                            <p>Region Impact</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/instructor-productivity" class="nav-link {% if page_id == 'instructor' %}active{% endif %}">
                            <i class="nav-icon fas fa-chalkboard-teacher"></i>
                            <p>Instructor Productivity</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/program-metrics" class="nav-link {% if page_id == 'programs' %}active{% endif %}">
                            <i class="nav-icon fas fa-layer-group"></i>
                            <p>Program Metrics</p>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </aside>

    <div class="content-wrapper">
        <section class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6">
                        <h1>{{ page_title }}</h1>
                    </div>
                    <div class="col-sm-6">
                        <ol class="breadcrumb float-sm-right">
                            <li class="breadcrumb-item"><a href="/">Home</a></li>
                            <li class="breadcrumb-item active">{{ page_title }}</li>
                        </ol>
                    </div>
                </div>
            </div>
        </section>

        <section class="content">
            <div class="container-fluid">
                {% block content %}{% endblock %}
            </div>
        </section>
    </div>

    <footer class="main-footer">
        <strong>Pramana Analytics Dashboard</strong>
        <div class="float-right d-none d-sm-inline-block">
            FastAPI, PostgreSQL, AdminLTE, Chart.js
        </div>
    </footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="{{ url_for('static', path='js/dashboard.js') }}"></script>
</body>
</html>
