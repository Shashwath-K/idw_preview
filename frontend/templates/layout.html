<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pramana | {{ page_title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}">
</head>
<body class="hold-transition sidebar-mini layout-fixed" data-page="{{ page_id }}">
<div class="wrapper">
    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
            </li>
        </ul>
        <span class="navbar-text font-weight-semibold text-uppercase small tracking-wide">Pramana Analytics Dashboard</span>
    </nav>

    <aside class="main-sidebar sidebar-dark-primary elevation-4">
        <a href="/" class="brand-link">
            <span class="brand-text font-weight-light">Agasthya IDW</span>
        </a>
        <div class="sidebar">
            <nav class="mt-3">
                <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu">
                    <li class="nav-item">
                        <a href="/" class="nav-link {% if page_id == 'dashboard' %}active{% endif %}">
                            <i class="nav-icon fas fa-hand-holding-heart"></i>
                            <p>Overview</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/instructor-productivity" class="nav-link {% if page_id == 'instructor' %}active{% endif %}">
                            <i class="nav-icon fas fa-chalkboard-teacher"></i>
                            <p>Instructor Performance</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/program-metrics" class="nav-link {% if page_id == 'programs' %}active{% endif %}">
                            <i class="nav-icon fas fa-user-graduate"></i>
                            <p>Student Exposure</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/upload" class="nav-link {% if page_id == 'upload' %}active{% endif %}">
                            <i class="nav-icon fas fa-file-excel"></i>
                            <p>Debug window</p>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </aside>

    <div class="content-wrapper">
        <section class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-12">
                        <h1>{{ page_title }}</h1>
                    </div>
                </div>
            </div>
        </section>

        <section class="content">
            <div class="container-fluid">
                {% block content %}{% endblock %}
            </div>
        </section>
    </div>

    <footer class="main-footer">
        <strong>Pramana Analytics Dashboard</strong>
        <div class="float-right d-none d-sm-inline-block">
            FastAPI, PostgreSQL, AdminLTE, Chart.js
        </div>
    </footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="{{ url_for('static', path='js/dashboard.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
