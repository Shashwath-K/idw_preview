{% extends "base.html" %}

{% block content %}
<!-- KPI Grid -->
{% include "partials/kpi_cards.html" %}

<!-- Filters -->
<div class="card card-default">
    <div class="card-body">
        <div class="row align-items-end">
            <div class="col-md-2">
                <div class="form-group mb-0">
                    <label>Start Year</label>
                    <select id="startYear" class="form-control select2">
                        <option value="2020">2020</option>
                        <option value="2021">2021</option>
                        <option value="2022">2022</option>
                        <option value="2023">2023</option>
                        <option value="2024">2024</option>
                        <option value="2025">2025</option>
                        <option value="2026">2026</option>
                    </select>
                </div>
            </div>
            <div class="col-md-2">
                <div class="form-group mb-0">
                    <label>End Year</label>
                    <select id="endYear" class="form-control select2">
                        <option value="2020">2020</option>
                        <option value="2021">2021</option>
                        <option value="2022">2022</option>
                        <option value="2023">2023</option>
                        <option value="2024">2024</option>
                        <option value="2025">2025</option>
                        <option value="2026" selected>2026</option>
                    </select>
                </div>
            </div>
            <div class="col-md-2">
                <div class="form-group mb-0">
                    <label>Region</label>
                    <select id="regionFilter" class="form-control select2">
                        <option value="">All Regions</option>
                    </select>
                </div>
            </div>
            <div class="col-md-2">
                <div class="form-group mb-0">
                    <label>Program</label>
                    <select id="programFilter" class="form-control select2">
                        <option value="">All Programs</option>
                    </select>
                </div>
            </div>
            <div class="col-md-2">
                <button id="seeReport" class="btn btn-primary btn-sm btn-block">See Report</button>
            </div>
            <div class="col-md-1">
                <button id="exportXlsx" class="btn btn-export btn-sm btn-block">
                    <i class="fas fa-file-excel"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<div class="row mt-2">
    <div class="col-lg-7 mb-3">
        <section class="card h-100 white-chart-card">
            <div class="card-header border-0">
                <h3 class="card-title">Monthly sessions</h3>
            </div>
            <div class="card-body">
                <div style="height:250px;">
                    <canvas id="sessionMonthlyChart"></canvas>
                </div>
            </div>
        </section>
    </div>
    <div class="col-lg-5 mb-3">
        <section class="card h-100 white-chart-card">
            <div class="card-header border-0">
                <h3 class="card-title">Sessions by region</h3>
            </div>
            <div class="card-body">
                <div style="height:250px;">
                    <canvas id="sessionRegionChart"></canvas>
                </div>
            </div>
        </section>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    $(function () {
        if ($.fn.select2) {
            $('.select2').select2({ theme: 'bootstrap4' });
        }

        fetch('/session/filters')
            .then(res => res.json())
            .then(data => {
                const rf = $('#regionFilter');
                const pf = $('#programFilter');
                data.regions.forEach(r => rf.append(new Option(r, r)));
                data.programs.forEach(p => pf.append(new Option(p, p)));
            });

        function loadData() {
            const filters = {
                start_year: $('#startYear').val(),
                end_year: $('#endYear').val(),
                region: $('#regionFilter').val(),
                program: $('#programFilter').val()
            };

            const query = new URLSearchParams(filters).toString();
            fetch(`/session/data?${query}`)
                .then(res => res.json())
                .then(data => {
                    $('#sessionTotalSessions').text(data.kpis.total_sessions.toLocaleString());
                    $('#sessionTotalInstructors').text(data.kpis.total_instructors);
                    $('#sessionActiveRegions').text(data.kpis.active_regions);
                    $('#sessionPrograms').text(data.kpis.total_programs);

                    // Monthly Chart
                    const ctxMonthly = document.getElementById('sessionMonthlyChart').getContext('2d');
                    if (window.monthlyChart) window.monthlyChart.destroy();
                    window.monthlyChart = new Chart(ctxMonthly, {
                        type: 'line',
                        data: data.charts.monthly,
                        options: {
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    display: true,
                                    position: 'bottom',
                                    align: 'start',
                                    labels: { color: '#000000' }
                                }


                            },
                            scales: {
                                x: {
                                    grid: { display: false },
                                    ticks: { color: '#000000' }
                                },
                                y: {
                                    beginAtZero: true,
                                    grid: { display: false },
                                    ticks: { color: '#000000' }
                                }
                            }
                        }
                    });

                    // Region Chart
                    const ctxRegion = document.getElementById('sessionRegionChart').getContext('2d');
                    if (window.regionChart) window.regionChart.destroy();
                    window.regionChart = new Chart(ctxRegion, {
                        type: 'bar',
                        data: data.charts.region,
                        options: {
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    display: true,
                                    position: 'bottom',
                                    align: 'start',
                                    labels: { color: '#000000' }
                                }


                            },
                            scales: {
                                x: {
                                    grid: { display: false },
                                    ticks: { color: '#000000' }
                                },
                                y: {
                                    beginAtZero: true,
                                    grid: { display: false },
                                    ticks: { color: '#000000' }
                                }
                            }
                        }
                    });
                });
        }

        $('#seeReport').click(function () {
            loadData();
        });

        $('#exportXlsx').click(function () {
            const filters = {
                start_year: $('#startYear').val(),
                end_year: $('#endYear').val(),
                region: $('#regionFilter').val(),
                program: $('#programFilter').val()
            };
            const query = new URLSearchParams(filters).toString();
            window.exportToXLSX(`/session/export?${query}`, 'session_report.xlsx');
        });

        // Auto-load
        setTimeout(loadData, 300);
    });
</script>
{% endblock %}
