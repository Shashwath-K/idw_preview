{% extends "base.html" %}

{% block content %}
<div class="row">
    <!-- Left Column: Filter Slicers -->
    <div class="col-md-2 mb-3">
        <div class="card card-outline card-primary h-100">
            <div class="card-header">
                <h3 class="card-title"><i class="fas fa-filter mr-1"></i> Filters</h3>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label>Region</label>
                    <select id="regionFilter" class="form-control select2">
                        <option value="">All Regions</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Area</label>
                    <select id="areaFilter" class="form-control select2">
                        <option value="">All Areas</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Program</label>
                    <select id="programFilter" class="form-control select2">
                        <option value="">All Programs</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Select Year</label>
                    <select id="yearFilter" class="form-control select2">
                        <option value="">All Years</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Month</label>
                    <select id="monthFilter" class="form-control select2">
                        <option value="">All Months</option>
                    </select>
                </div>
                <hr>
                <button id="seeReport" class="btn btn-primary btn-block mb-2">
                    <i class="fas fa-sync-alt mr-1"></i> See Report
                </button>
                <button id="exportXlsx" class="btn btn-export btn-block">
                    <i class="fas fa-file-excel mr-1"></i> Export to XLSX
                </button>
            </div>
        </div>
    </div>

    <!-- Right Column: Dashboard Content -->
    <div class="col-md-10">
        <!-- Dynamic KPI Cards -->
        <div class="row mb-4">
            <div class="col-lg-3 col-6">
                <div class="small-box bg-info">
                    <div class="inner">
                        <h3 id="kpiTotalSchools">0</h3>
                        <p>Total Schools</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-school"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-success">
                    <div class="inner">
                        <h3 id="kpiTotalStudents">0</h3>
                        <p>Total Students</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-user-graduate"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-navy-blue">
                    <div class="inner">
                        <h3 id="kpiTotalSessions">0</h3>
                        <p>No of sessions</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-calendar-check"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-danger">
                    <div class="inner">
                        <h3 id="kpiMonthlySessions">0</h3>
                        <p>Monthly sessions</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-calendar-alt"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="card mt-2">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table id="visitTable" class="table table-striped table-hover mb-0 high-contrast-table">
                        <thead>
                            <tr>
                                <th>School Name</th>
                                <th>Program Name</th>
                                <th>Class</th>
                                <th>SECTION</th>
                                <th class="text-center">No. of Sessions</th>
                                <th class="text-center">Exposures</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
                {% include "partials/pagination.html" %}
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(function () {
    const pagination = window.PramanaPagination;

    if ($.fn.select2) {
        $('.select2').select2({ theme: 'bootstrap4' });
    }

    // Initial load: Only fetch regions
    function initFilters() {
        const regionSelect = $('#regionFilter');
        const areaSelect = $('#areaFilter');
        const programSelect = $('#programFilter');
        const yearSelect = $('#yearFilter');
        const monthSelect = $('#monthFilter');

        // Initially disable dependent filters
        areaSelect.prop('disabled', true);
        programSelect.prop('disabled', true);

        fetch('/school-visit/filters')
            .then(res => res.json())
            .then(data => {
                regionSelect.empty().append('<option value="">All Regions</option>');
                data.regions.forEach(r => regionSelect.append(new Option(r, r)));
                
                yearSelect.empty().append('<option value="">All Years</option>');
                data.years.forEach(y => yearSelect.append(new Option(y, y)));
                
                monthSelect.empty().append('<option value="">All Months</option>');
                data.months.forEach(m => monthSelect.append(new Option(m.name, m.id)));
            });
    }

    function refreshDependentFilters(regionName) {
        const areaSelect = $('#areaFilter');
        const programSelect = $('#programFilter');

        if (!regionName) {
            areaSelect.empty().append('<option value="">All Areas</option>').prop('disabled', true);
            programSelect.empty().append('<option value="">All Programs</option>').prop('disabled', true);
            return;
        }

        fetch(`/school-visit/filters?region_name=${encodeURIComponent(regionName)}`)
            .then(res => res.json())
            .then(data => {
                areaSelect.empty().append('<option value="">All Areas</option>').prop('disabled', false);
                data.areas.forEach(a => areaSelect.append(new Option(a, a)));

                programSelect.empty().append('<option value="">All Programs</option>').prop('disabled', false);
                data.programs.forEach(p => programSelect.append(new Option(p, p)));
            });
    }

    $('#regionFilter').on('change', function() {
        refreshDependentFilters($(this).val());
    });

    function loadData() {
        const filters = {
            region: $('#regionFilter').val(),
            area: $('#areaFilter').val(),
            program: $('#programFilter').val(),
            year: $('#yearFilter').val(),
            month: $('#monthFilter').val(),
            limit: pagination.state.limit,
            offset: pagination.state.offset
        };

        const query = new URLSearchParams(filters).toString();
        fetch(`/school-visit/data?${query}`)
            .then(res => res.json())
            .then(data => {
                const tbody = $('#visitTable tbody');
                tbody.empty();

                // Update KPIs
                if (data.kpis) {
                    $('#kpiTotalSchools').text(data.kpis.total_schools.toLocaleString());
                    $('#kpiTotalStudents').text(data.kpis.total_students.toLocaleString());
                    $('#kpiTotalSessions').text(data.kpis.total_sessions.toLocaleString());
                    $('#kpiMonthlySessions').text(data.kpis.monthly_sessions.toLocaleString());
                }

                if (data.table.length === 0) {
                    tbody.append('<tr><td colspan="6" class="text-center">No visits found matching these filters</td></tr>');
                    pagination.updateInfo('visitTable', 0);
                    return;
                }
                
                data.table.forEach(row => {
                    tbody.append(`
                        <tr>
                            <td><strong>${row.school_name}</strong></td>
                            <td><span class="badge badge-info">${row.program_name}</span></td>
                            <td>${row.class_name}</td>
                            <td>${row.section_name}</td>
                            <td class="text-center font-weight-bold">${row.sessions}</td>
                            <td class="text-center font-weight-bold text-primary">${row.exposures.toLocaleString()}</td>
                        </tr>
                    `);
                });
                pagination.updateInfo('visitTable', data.total_count);
            });
    }

    $('#seeReport').click(function () {
        pagination.reset();
        loadData();
    });

    $('.prev-page').click(function() {
        pagination.prev(loadData);
    });

    $('.next-page').click(function() {
        pagination.next(loadData);
    });

    $('#exportXlsx').click(function() {
        const filters = {
            region: $('#regionFilter').val(),
            area: $('#areaFilter').val(),
            program: $('#programFilter').val(),
            year: $('#yearFilter').val(),
            month: $('#monthFilter').val()
        };
        const query = new URLSearchParams(filters).toString();
        window.exportToXLSX(`/school-visit/export?${query}`, 'school_visits.xlsx');
    });

    // Initialize
    initFilters();
    setTimeout(loadData, 400);
});
</script>

{% endblock %}
