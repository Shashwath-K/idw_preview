{% extends "base.html" %}

{% block content %}
<!-- KPI Cards -->
{% include "partials/kpi_cards.html" %}

<!-- Filters -->
<div class="card card-default">
    <div class="card-body">
        <div class="row align-items-end">
            <div class="col-md-2">
                <div class="form-group mb-0">
                    <label>Region</label>
                    <select id="regionFilter" class="form-control select2">
                        <option value="">All Regions</option>
                    </select>
                </div>
            </div>
            <div class="col-md-2">
                <div class="form-group mb-0">
                    <label>Area</label>
                    <select id="areaFilter" class="form-control select2">
                        <option value="">All Areas</option>
                    </select>
                </div>
            </div>
            <div class="col-md-2">
                <div class="form-group mb-0">
                    <label>Select Year</label>
                    <select id="yearFilter" class="form-control select2">
                        <option value="">All Years</option>
                    </select>
                </div>
            </div>
            <div class="col-md-2">
                <div class="form-group mb-0">
                    <label>Month</label>
                    <select id="monthFilter" class="form-control select2">
                        <option value="">All Months</option>
                    </select>
                </div>
            </div>
            <div class="col-md-2">
                <button id="seeReport" class="btn btn-primary btn-sm btn-block">See Report</button>
            </div>
            <div class="col-md-1">
                <button id="exportXlsx" class="btn btn-export btn-sm btn-block">
                    <i class="fas fa-file-excel"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Table -->
<div class="card mt-2">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table id="workDayTable" class="table table-striped table-hover mb-0 high-contrast-table">
                <thead>
                    <tr>
                        <th>Instructor</th>
                        <th>Region/Area</th>
                        <th>Total Days Worked</th>
                        <th>Dates Active (DD)</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>
        {% include "partials/pagination.html" %}
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(function () {
    const pagination = window.PramanaPagination;

    if ($.fn.select2) {
        $('.select2').select2({ theme: 'bootstrap4' });
    }

    fetch('/work-day/filters')
        .then(res => res.json())
        .then(data => {
            const regionSelect = $('#regionFilter');
            const areaSelect = $('#areaFilter');
            const yearSelect = $('#yearFilter');
            const monthSelect = $('#monthFilter');

            data.regions.forEach(r => regionSelect.append(new Option(r, r)));
            data.areas.forEach(a => areaSelect.append(new Option(a, a)));
            data.years.forEach(y => yearSelect.append(new Option(y, y)));
            data.months.forEach(m => monthSelect.append(new Option(m.name, m.id)));
        });

    function loadData() {
        const filters = {
            region: $('#regionFilter').val(),
            area: $('#areaFilter').val(),
            year: $('#yearFilter').val(),
            month: $('#monthFilter').val(),
            limit: pagination.state.limit,
            offset: pagination.state.offset
        };

        const query = new URLSearchParams(filters).toString();
        fetch(`/work-day/data?${query}`)
            .then(res => res.json())
            .then(data => {
                const tbody = $('#workDayTable tbody');
                tbody.empty();
                if (data.table.length === 0) {
                    tbody.append('<tr><td colspan="4" class="text-center">No data found</td></tr>');
                    pagination.updateInfo('workDayTable', 0);
                    return;
                }
                data.table.forEach(row => {
                    tbody.append(`
                        <tr>
                            <td>${row.instructor_name}</td>
                            <td>${row.region} / ${row.area}</td>
                            <td><span class="badge badge-info">${row.days_worked}</span></td>
                            <td>${row.dates_active}</td>
                        </tr>
                    `);
                });
                pagination.updateInfo('workDayTable', data.total_count);
            });
    }

    $('#seeReport').click(function () {
        pagination.reset();
        loadData();
    });

    $('.prev-page').click(function() {
        pagination.prev(loadData);
    });

    $('.next-page').click(function() {
        pagination.next(loadData);
    });

    $('#exportXlsx').click(function() {
        const filters = {
            region: $('#regionFilter').val(),
            area: $('#areaFilter').val(),
            year: $('#yearFilter').val(),
            month: $('#monthFilter').val()
        };
        const query = new URLSearchParams(filters).toString();
        window.exportToXLSX(`/work-day/export?${query}`, 'work_day_report.xlsx');
    });

    // Auto-load
    setTimeout(loadData, 300);
});
</script>
{% endblock %}
