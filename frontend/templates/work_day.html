{% extends "base.html" %}

{% block content %}
<div class="row">
    <!-- Left Column: Filter Slicers -->
    <div class="col-md-2 mb-3">
        <div class="card card-outline card-primary h-100">
            <div class="card-header">
                <h3 class="card-title text-bold"><i class="fas fa-filter mr-1"></i> Filters</h3>
            </div>
            <div class="card-body">
                <div class="form-group mb-3">
                    <label>Region</label>
                    <select id="regionFilter" class="form-control select2">
                        <option value="">All Regions</option>
                    </select>
                </div>
                <div class="form-group mb-3">
                    <label>Area</label>
                    <select id="areaFilter" class="form-control select2">
                        <option value="">All Areas</option>
                    </select>
                </div>
                <div class="form-group mb-3">
                    <label>Year</label>
                    <select id="yearFilter" class="form-control select2">
                        <option value="">All Years</option>
                    </select>
                </div>
                <div class="form-group mb-3">
                    <label>Month</label>
                    <select id="monthFilter" class="form-control select2">
                        <option value="">All Months</option>
                    </select>
                </div>
                <hr>
                <button id="seeReport" class="btn btn-primary btn-block mb-2 text-bold">
                    <i class="fas fa-sync-alt mr-1"></i> See Report
                </button>
                <button id="exportXlsx" class="btn btn-export btn-block text-bold">
                    <i class="fas fa-file-excel mr-1"></i> Export to XLSX
                </button>
            </div>
        </div>
    </div>

    <!-- Right Column: Dashboard Content -->
    <div class="col-md-10">
        <!-- KPI Cards -->
        <div id="kpiContainer" class="row mb-4">
            <div class="col-lg-3 col-6">
                <div class="small-box bg-info">
                    <div class="inner">
                        <h3 id="kpiTotalInstructors">0</h3>
                        <p>Total Instructors</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-users"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-success">
                    <div class="inner">
                        <h3 id="kpiTotalWorkingDays">0</h3>
                        <p>Total Working Days</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-calendar-check"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-navy-blue">
                    <div class="inner">
                        <h3 id="kpiAvgDays">0</h3>
                        <p>Avg Days/Instructor</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-chart-line"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-6">
                <div class="small-box bg-danger">
                    <div class="inner">
                        <h3 id="kpiActiveCenters">0</h3>
                        <p>Active Centers</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-map-marker-alt"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="card mt-2">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table id="workDayTable" class="table table-striped table-hover mb-0 high-contrast-table">
                        <thead class="bg-light">
                            <tr>
                                <th>Instructor</th>
                                <th>Region / Area</th>
                                <th class="text-center">Work Days</th>
                                <th>Dates Active (DD)</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
                {% include "partials/pagination.html" %}
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(function () {
    const pagination = window.PramanaPagination;

    if ($.fn.select2) {
        $('.select2').select2({ theme: 'bootstrap4' });
    }

    // Load Filters
    fetch('/work-day/filters')
        .then(res => res.json())
        .then(data => {
            const regionSelect = $('#regionFilter');
            const areaSelect = $('#areaFilter');
            const yearSelect = $('#yearFilter');
            const monthSelect = $('#monthFilter');

            data.regions.forEach(r => regionSelect.append(new Option(r, r)));
            data.areas.forEach(a => areaSelect.append(new Option(a, a)));
            data.years.forEach(y => yearSelect.append(new Option(y, y)));
            data.months.forEach(m => monthSelect.append(new Option(m.name, m.id)));
        });

    function loadData() {
        const filters = {
            region: $('#regionFilter').val(),
            area: $('#areaFilter').val(),
            year: $('#yearFilter').val(),
            month: $('#monthFilter').val(),
            limit: pagination.state.limit,
            offset: pagination.state.offset
        };

        const query = new URLSearchParams(filters).toString();
        fetch(`/work-day/data?${query}`)
            .then(res => res.json())
            .then(data => {
                const tbody = $('#workDayTable tbody');
                tbody.empty();

                // Update KPIs
                if (data.kpis && data.kpis.length >= 4) {
                    $('#kpiTotalInstructors').text(data.kpis[0].value.toLocaleString());
                    $('#kpiTotalWorkingDays').text(data.kpis[1].value.toLocaleString());
                    $('#kpiAvgDays').text(data.kpis[2].value);
                    $('#kpiActiveCenters').text(data.kpis[3].value.toLocaleString());
                }

                if (!data.table || data.table.length === 0) {
                    tbody.append('<tr><td colspan="4" class="text-center">No data found</td></tr>');
                    pagination.updateInfo('workDayTable', 0);
                    return;
                }

                data.table.forEach(row => {
                    tbody.append(`
                        <tr>
                            <td class="text-bold text-navy">${row.instructor_name}</td>
                            <td><small class="text-muted"><i class="fas fa-globe mr-1"></i> ${row.region}</small> / ${row.area}</td>
                            <td class="text-center"><span class="badge badge-info">${row.days_worked}</span></td>
                            <td><div class="text-primary font-weight-bold" style="word-break: break-all;">${row.dates_active}</div></td>
                        </tr>
                    `);
                });
                pagination.updateInfo('workDayTable', data.total_count);
            })
            .catch(err => console.error("Error fetching data:", err));
    }

    $('#seeReport').click(function () {
        pagination.reset();
        loadData();
    });

    $('.prev-page').click(function() {
        pagination.prev(loadData);
    });

    $('.next-page').click(function() {
        pagination.next(loadData);
    });

    $('#exportXlsx').click(function() {
        const filters = {
            region: $('#regionFilter').val(),
            area: $('#areaFilter').val(),
            year: $('#yearFilter').val(),
            month: $('#monthFilter').val()
        };
        const query = new URLSearchParams(filters).toString();
        window.exportToXLSX(`/work-day/export?${query}`, 'work_day_report.xlsx');
    });

    // Initial Load
    setTimeout(loadData, 300);
});
</script>
{% endblock %}
