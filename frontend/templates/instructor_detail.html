{% extends "base.html" %}

{% block content %}
<div class="row">
    <!-- Left Column: Filter Slicers -->
    <div class="col-md-2 mb-3">
        <div class="card card-outline card-primary h-100">
            <div class="card-header">
                <h3 class="card-title"><i class="fas fa-filter mr-1"></i> Filters</h3>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label>Instructor</label>
                    <select id="instructorFilter" class="form-control select2">
                        <option value="">All Instructors</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Select Year</label>
                    <select id="yearFilter" class="form-control select2">
                        <option value="">All Years</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Month</label>
                    <select id="monthFilter" class="form-control select2">
                        <option value="">All Months</option>
                    </select>
                </div>
                <hr>
                <button id="seeReport" class="btn btn-primary btn-block mb-2">
                    <i class="fas fa-sync-alt mr-1"></i> See Report
                </button>
                <button id="exportXlsx" class="btn btn-export btn-block">
                    <i class="fas fa-file-excel mr-1"></i> Export to XLSX
                </button>
            </div>
        </div>
    </div>

    <!-- Right Column: Dashboard Content -->
    <div class="col-md-10">
        <!-- KPI Cards -->
        {% include "partials/kpi_cards.html" %}

        <!-- Table -->
        <div class="card mt-2">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table id="detailTable" class="table table-striped table-hover mb-0 high-contrast-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>School Name</th>
                                <th>Activity</th>
                                <th>Duration (Hrs)</th>
                                <th>Students</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
                {% include "partials/pagination.html" %}
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(function () {
    const pagination = window.PramanaPagination;

    if ($.fn.select2) {
        $('.select2').select2({ theme: 'bootstrap4' });
    }

    fetch('/instructor-detail/filters')
        .then(res => res.json())
        .then(data => {
            const instructorSelect = $('#instructorFilter');
            const yearSelect = $('#yearFilter');
            const monthSelect = $('#monthFilter');

            data.instructors.forEach(i => instructorSelect.append(new Option(i, i)));
            data.years.forEach(y => yearSelect.append(new Option(y, y)));
            data.months.forEach(m => monthSelect.append(new Option(m.name, m.id)));
        });

    function loadData() {
        const filters = {
            instructor_name: $('#instructorFilter').val(),
            year: $('#yearFilter').val(),
            month: $('#monthFilter').val(),
            limit: pagination.state.limit,
            offset: pagination.state.offset
        };

        const query = new URLSearchParams(filters).toString();
        fetch(`/instructor-detail/data?${query}`)
            .then(res => res.json())
            .then(data => {
                const tbody = $('#detailTable tbody');
                tbody.empty();
                if (data.table.length === 0) {
                    tbody.append('<tr><td colspan="6" class="text-center">No data found</td></tr>');
                    pagination.updateInfo('detailTable', 0);
                    return;
                }
                data.table.forEach(row => {
                    const statusClass = row.status === 'Overdue' ? 'badge badge-danger' : 'badge badge-success';
                    tbody.append(`
                        <tr>
                            <td>${row.date}</td>
                            <td>${row.school_name}</td>
                            <td>${row.activity_name}</td>
                            <td>${row.session_duration}</td>
                            <td>${row.students}</td>
                            <td><span class="${statusClass}">${row.status}</span></td>
                        </tr>
                    `);
                });
                pagination.updateInfo('detailTable', data.total_count);
            });
    }

    $('#seeReport').click(function () {
        pagination.reset();
        loadData();
    });

    $('.prev-page').click(function() {
        pagination.prev(loadData);
    });

    $('.next-page').click(function() {
        pagination.next(loadData);
    });

    $('#exportXlsx').click(function() {
        const filters = {
            instructor_name: $('#instructorFilter').val(),
            year: $('#yearFilter').val(),
            month: $('#monthFilter').val()
        };
        const query = new URLSearchParams(filters).toString();
        window.exportToXLSX(`/instructor-detail/export?${query}`, 'instructor_detail.xlsx');
    });

    // Auto-load
    setTimeout(loadData, 300);
});
</script>
{% endblock %}
