{% extends "base.html" %}

{% block content %}

<section class="content">
    <div class="container-fluid">
        <!-- Filters -->
        <div class="card card-default">
            <div class="card-body">
                <div class="row align-items-end">
                    <div class="col-md-2">
                        <div class="form-group mb-0">
                            <label>Region</label>
                            <select id="regionFilter" class="form-control select2">
                                <option value="">All Regions</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="form-group mb-0">
                            <label>Area</label>
                            <select id="areaFilter" class="form-control select2">
                                <option value="">All Areas</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="form-group mb-0">
                            <label>Select Year</label>
                            <select id="yearFilter" class="form-control select2">
                                <option value="">All Years</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="form-group mb-0">
                            <label>Month</label>
                            <select id="monthFilter" class="form-control select2">
                                <option value="">All Months</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-4 mt-2">
                        <button id="seeReport" class="btn btn-primary">See Report</button>
                        <button id="exportReport" class="btn btn-outline-secondary ml-1" disabled>Export</button>
                        <button id="inactiveUserReport" class="btn btn-outline-dark ml-1">InactiveUserReport</button>
                    </div>
                </div>
            </div>
            
            <!-- KPI Cards -->
            {% include "partials/kpi_cards.html" %}
        </div>

        <!-- Instructor Table -->
        <div class="card mt-3">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table id="instructorTable" class="table table-striped table-hover mb-0">
                        <thead>
                            <tr>
                                <th>Instructor...</th>
                                <th>Days worked</th>
                                <th>School Session</th>
                                <th>School Exposures</th>
                                <th>No.of Fair</th>
                                <th>YIExp Training</th>
                                <th>SF Expo...</th>
                                <th>YIL Session</th>
                                <th>YIL Expo...</th>
                                <th>CV visit</th>
                                <th>CV Exps</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Data will be populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}

{% block scripts %}
<script>
$(function () {
    // Initialize Select2 if available
    if ($.fn.select2) {
        $('.select2').select2({ theme: 'bootstrap4' });
    }

    // Load Filters
    fetch('/instructor-summary/filters')
        .then(res => res.json())
        .then(data => {
            const regionSelect = $('#regionFilter');
            const areaSelect = $('#areaFilter');
            const yearSelect = $('#yearFilter');
            const monthSelect = $('#monthFilter');

            data.regions.forEach(r => regionSelect.append(new Option(r, r)));
            data.areas.forEach(a => areaSelect.append(new Option(a, a)));
            data.years.forEach(y => yearSelect.append(new Option(y, y)));
            data.months.forEach(m => monthSelect.append(new Option(m.name, m.id)));
        });

    // See Report Button
    $('#seeReport').click(function () {
        const filters = {
            region: $('#regionFilter').val(),
            area: $('#areaFilter').val(),
            year: $('#yearFilter').val(),
            month: $('#monthFilter').val()
        };

        const queryParams = new URLSearchParams(filters).toString();
        
        fetch(`/instructor-summary/data?${queryParams}`)
            .then(res => res.json())
            .then(data => {
                const tbody = $('#instructorTable tbody');
                tbody.empty();

                if (data.table.length === 0) {
                    tbody.append('<tr><td colspan="11" class="text-center">No data found</td></tr>');
                    return;
                }

                data.table.forEach(row => {
                    tbody.append(`
                        <tr>
                            <td>${row.instructor_name}</td>
                            <td>${row.days_worked}</td>
                            <td>${row.school_sessions}</td>
                            <td>${row.total_exposures}</td>
                            <td>${row.fair_count}</td>
                            <td>${row.training_exposures}</td>
                            <td>${row.sf_exposures}</td>
                            <td>${row.yil_sessions}</td>
                            <td>${row.yil_exposures}</td>
                            <td>${row.cv_visits}</td>
                            <td>${row.cv_exposures}</td>
                        </tr>
                    `);
                });
            });
    });
});
</script>
<style>
    .nav-divider hr {
        margin: 0.5rem 1rem;
        border-top: 1px solid rgba(255,255,255,0.1);
    }
</style>
{% endblock %}
